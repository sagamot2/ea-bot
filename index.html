<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUS CREATIVE | EA Dashboard</title>
    <style>
        /* สไตล์แบบ Glassmorphism ที่กัสชอบ */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a1a2e, #16213e);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 350px;
        }

        h1 { font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 2px; color: #00d2ff; }

        .stat-group { margin-bottom: 25px; }
        .label { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        .value { font-size: 2.5rem; font-weight: bold; margin-top: 5px; }
        .unit { font-size: 1rem; color: #00d2ff; margin-left: 5px; }

        .status-dot {
            width: 8px; height: 8px; background: #00ff88;
            border-radius: 50%; display: inline-block;
            margin-right: 8px; box-shadow: 0 0 10px #00ff88;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .sync-text { font-size: 0.7rem; color: #666; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <h1>GUS SNIPER OS</h1>
        
        <div class="stat-group">
            <div class="label">Total Profit</div>
            <div class="value" id="profit">0.00<span class="unit">$</span></div>
        </div>

        <div class="stat-group">
            <div class="label">Win Rate</div>
            <div class="value" id="winrate">0<span class="unit">%</span></div>
        </div>

        <div class="sync-text">
            <span class="status-dot"></span> Real-time Syncing...
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxLkmgRdttMNm3LCOugbKi-ZpecdOSudbcEJvb9wXHDeAmCR-BKYvrj8ruaK3Z1lXo8KA/exec";

        async function updateDashboard() {
            try {
                // ดึงข้อมูลจาก Google Sheets (ท่อ doGet)
                const response = await fetch(API_URL);
                const data = await response.json();

                // อัปเดตตัวเลขลงหน้าเว็บ
                document.getElementById('profit').innerHTML = parseFloat(data.profit).toLocaleString(undefined, {minimumFractionDigits: 2}) + '<span class="unit">$</span>';
                document.getElementById('winrate').innerHTML = data.winrate + '<span class="unit">%</span>';
                
                console.log("Data Synced: ", new Date().toLocaleTimeString());
            } catch (error) {
                console.error("Sync Error:", error);
            }
        }

        updateDashboard();

        // 🔄 3. ตั้งเวลาให้ดึงข้อมูลใหม่ทุกๆ 5 วินาที (5000 มิลลิวินาที)
        // กัสสามารถปรับตัวเลขนี้ได้ตามใจชอบ (เช่น 2000 = 2 วินาที)
        setInterval(updateDashboard, 5000);
    </script>
</body>
</html>
